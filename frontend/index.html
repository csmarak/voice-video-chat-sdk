<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceVidChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <!-- Lobby: Create Room -->
        <div id="lobbyView" class="view active">
            <div class="card">
                <div class="logo">VoiceVidChat</div>
                <p class="subtitle">Secure multi-peer audio & video rooms</p>

                <div class="room-type-select">
                    <button id="typeVoice" class="type-btn active" data-type="voice">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                        <span>Audio</span>
                        <small>Up to 4 people</small>
                    </button>
                    <button id="typeVideo" class="type-btn" data-type="video">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <polygon points="23 7 16 12 23 17 23 7"/>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                        </svg>
                        <span>Video</span>
                        <small>Up to 4 people</small>
                    </button>
                </div>

                <div class="input-group">
                    <label for="lobbyUsername">Your Name</label>
                    <input type="text" id="lobbyUsername" placeholder="Enter your name" maxlength="24" autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="lobbyPassword">Room Password <span>(optional)</span></label>
                    <input type="password" id="lobbyPassword" placeholder="Set a password" maxlength="32" autocomplete="off">
                </div>

                <button id="createBtn" class="btn-primary">Create Room</button>

                <div class="divider"><span>or</span></div>

                <button id="goJoinBtn" class="btn-secondary">Join Existing Room</button>
            </div>
        </div>

        <!-- Join Existing Room -->
        <div id="joinView" class="view">
            <div class="card">
                <div class="logo">VoiceVidChat</div>
                <p class="subtitle">Join an existing meeting</p>

                <div class="input-group">
                    <label for="joinCode">Meeting Code</label>
                    <input type="text" id="joinCode" placeholder="e.g. ABC123" maxlength="6" autocomplete="off" style="text-transform:uppercase; letter-spacing:4px; text-align:center; font-size:22px; font-weight:700;">
                </div>

                <div class="input-group">
                    <label for="joinUsername">Your Name</label>
                    <input type="text" id="joinUsername" placeholder="Enter your name" maxlength="24" autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="joinPassword">Room Password <span>(if required)</span></label>
                    <input type="password" id="joinPassword" placeholder="Enter password" maxlength="32" autocomplete="off">
                </div>

                <button id="joinBtn" class="btn-primary">Join Room</button>

                <div class="divider"><span>or</span></div>

                <button id="goCreateBtn" class="btn-secondary">Create a Room</button>
            </div>
        </div>

        <!-- Room View -->
        <div id="roomView" class="view">
            <div class="room-topbar">
                <div class="room-info">
                    <span class="room-code" id="roomCodeDisplay">CODE</span>
                    <span class="room-type-badge" id="roomTypeBadge">audio</span>
                </div>
                <span class="room-timer" id="roomTimer">0:00</span>
            </div>

            <div class="participant-grid" id="participantGrid">
                <!-- Filled programmatically -->
            </div>

            <div class="room-controls">
                <button id="roomMicBtn" class="ctrl-btn active" title="Toggle Mic">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <button id="roomCamBtn" class="ctrl-btn" title="Toggle Camera">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polygon points="23 7 16 12 23 17 23 7"/>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                    </svg>
                </button>
                <button id="roomLeaveBtn" class="ctrl-btn ctrl-leave" title="Leave">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="livekit-client.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
